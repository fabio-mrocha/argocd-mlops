executor: KubernetesExecutor
createUserJob:
  useHelmHooks: false
  applyCustomEnv: false
migrateDatabaseJob:
  useHelmHooks: false
  applyCustomEnv: false
webserver:
  replicas: 1
scheduler:
  replicas: 1
triggerer:
  replicas: 1
postgresql:
  enabled: true
redis:
  enabled: false
dags:
  persistence:
    enabled: false
logs:
  persistence:
    enabled: false
workers:
  persistence:
    enabled: false
